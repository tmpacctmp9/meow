<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yaar Win - Play & Earn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #2d2e2e 0%, #000000 100%);
      color: white;
      min-height: 100vh;
      text-align: center;
      padding: 20px 15px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #20bf6b;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-login {
      background: #20bf6b;
      color: white;
    }

    .btn-register {
      background: #eb3b5a;
      color: white;
    }

    .btn-telegram {
      background: #fed330;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .image-container {
      margin: 30px 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .support-text {
      margin: 30px 0 20px;
      font-size: 1rem;
      opacity: 0.85;
    }

    footer {
      margin-top: 50px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <img src="https://media.mssg.space/thumbnails/small/w/69eb341cac3c54f8a37faa72/websites/69fae586ac3c54f8a324200d/Yaarwin.logo_-989x1024_1778211764554.jpeg" 
         alt="Yaar Win Logo" class="logo">

    <!-- Title & Subtitle -->
    <h1>Yaar Win</h1>
    <p class="subtitle">You can make lots of love and Fun and enjoy here</p>

    <!-- Buttons -->
    <a href="https://yaarwin1.com/#/register?invitationCode=65132399173" 
       class="btn btn-login" target="_blank">Login Now</a>
    
    <a href="https://yaarwin1.com/#/register?invitationCode=65132399173" 
       class="btn btn-register" target="_blank">Register Now</a>

    <!-- Image -->
    <div class="image-container">
      <img src="https://media.mssg.space/thumbnails/medium/w/69eb341cac3c54f8a37faa72/websites/69fae586ac3c54f8a324200d/hwpE1voXj3iYEACxoFwfLv_1778211655839.jpeg" 
           alt="Yaar Win">
    </div>

    <!-- Telegram Support -->
    <a href="https://t.me/YaarwinCSRbot" 
       class="btn btn-telegram" target="_blank">
      <span>💬</span>
      Telegram Support
    </a>

    <p class="support-text">
      The Ads Be Setup By Telegram: <strong>@boatleee1509</strong>
    </p>

    <footer>
      &copy; 2026 Yaar Win • All Rights Reserved
    </footer>
  </div>

  <script>
    // Simple animation on load
    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.btn');
      buttons.forEach((btn, index) => {
        btn.style.opacity = '0';
        btn.style.transform = 'translateY(20px)';
        setTimeout(() => {
          btn.style.transition = 'all 0.6s ease';
          btn.style.opacity = '1';
          btn.style.transform = 'translateY(0)';
        }, 300 + index * 100);
      });
    });
  </script>
</body>
</html>
